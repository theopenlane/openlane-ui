<script>
  (function () {
    function applyTheme(isDark) {
      document.documentElement.classList.toggle('dark', isDark);
    }

    // Apply from URL on initial load (persisted globals)
    var urlGlobals = new URLSearchParams(location.search).get('globals') || '';
    applyTheme(urlGlobals.indexOf('theme:dark') !== -1);

    // Poll until the Storybook channel is ready, then subscribe
    function waitForChannel() {
      var ch = window.__STORYBOOK_ADDONS_CHANNEL__;
      if (!ch) { setTimeout(waitForChannel, 100); return; }
      // 'globalsUpdated' fires in the manager when the preview confirms the new globals
      ch.on('globalsUpdated', function (data) {
        var theme = (data.userGlobals || data.globals || {})['theme'];
        applyTheme(theme === 'dark');
      });
    }
    waitForChannel();
  })();
</script>
