name: permissions-drift

# Fails when the committed AccessEnum / TAccessRole are stale against theopenlane/core's published
# FGA permission catalog. Scoped to ONLY the permission generator so it can't false-positive on
# unrelated GraphQL-schema drift. If this fails, run `task codegen:codegen` and commit the result.
#
# Until core publishes permissions.json, the generator's fetch 404s, keeps the committed file, and
# exits 0 (no drift) — the gate only starts enforcing once the catalog ships on core@main.

on:
  pull_request:

permissions:
  contents: read

jobs:
  permissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.16

      # Need the workspace installed for the repo-pinned prettier (so formatting matches the
      # committed file exactly) and for the authz test below.
      - run: bun install --frozen-lockfile

      - name: Regenerate permission enum from core@main
        run: bun packages/codegen/plugins/generate-permissions.js

      # Run the SAME prettier the commit path runs, so raw-generator vs committed-prettified output
      # can never permanently diverge.
      - name: Format generated file
        working-directory: packages/codegen
        run: bun run prettier --write src/permissions.generated.ts

      - name: Fail on drift
        run: |
          # intent-to-add so a brand-new / untracked generated file still shows in `git diff`
          # (an untracked file would otherwise report no diff and silently pass).
          git add -N packages/codegen/src/permissions.generated.ts
          if ! git diff --quiet -- packages/codegen/src/permissions.generated.ts; then
            echo "::error::permissions.generated.ts is stale vs theopenlane/core's FGA catalog. Run 'task codegen:codegen' and commit."
            git --no-pager diff -- packages/codegen/src/permissions.generated.ts
            exit 1
          fi

      # Guards the action->permission map (permission-map.test.ts) in CI, not just husky.
      - name: Run authz tests
        working-directory: apps/console
        run: bun test src/lib/authz
